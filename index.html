<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0;
    overflow: hidden;
    background: transparent;
    width: 100%;
    height: 100%;
  }

  #overlay {
    position: absolute;
    right: 40px;
    bottom: 220px;
    width: 420px;
    height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    pointer-events: none;
  }

  #overlay.show {
    opacity: 1;
    transform: translateY(0);
  }

  video {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    display: block;
    object-fit: contain;
    background: transparent;
    transform-origin: center;
    transition: transform 0.2s ease;
  }
</style>
</head>

<body>

<div id="overlay">
  <video id="video" muted playsinline preload="auto"></video>
</div>

<script>
  const videos = [
    { src: "ytoverlay.webm", scale: 1, offsetY: -20 },
    { src: "seguirme.webm", scale: 0.8, offsetY: 0 },
    { src: "codigo.webm", scale: 1.55, offsetY: 0 } // 👈 ESTE SUBE
  ];

  const PAUSA_ENTRE_RONDAS = 80000;
  const PAUSA_ENTRE_VIDEOS = 150;
  const PRIMER_INICIO = 3000;

  const overlay = document.getElementById("overlay");
  const video = document.getElementById("video");

  let indice = 0;
  let timeoutActual = null;

  function limpiarVideo() {
    video.pause();
    video.removeAttribute("src");
    video.load();
    video.style.transform = "scale(1) translateY(0px)";
  }

  function mostrarVideoActual() {
    limpiarVideo();

    const item = videos[indice];

    video.src = item.src;
    video.currentTime = 0;

    // 👇 ESCALA + POSICIÓN
    video.style.transform = `scale(${item.scale}) translateY(${item.offsetY}px)`;

    overlay.classList.add("show");

    video.play().catch((err) => {
      console.error("Error al reproducir:", err);
      avanzarFlujo();
    });
  }

  function ocultarOverlay(callback) {
    overlay.classList.remove("show");

    setTimeout(() => {
      limpiarVideo();
      if (callback) callback();
    }, 400);
  }

  function avanzarFlujo() {
    const esUltimo = indice === videos.length - 1;

    ocultarOverlay(() => {
      if (esUltimo) {
        indice = 0;
        timeoutActual = setTimeout(() => {
          mostrarVideoActual();
        }, PAUSA_ENTRE_RONDAS);
      } else {
        indice++;
        timeoutActual = setTimeout(() => {
          mostrarVideoActual();
        }, PAUSA_ENTRE_VIDEOS);
      }
    });
  }

  video.addEventListener("ended", () => {
    avanzarFlujo();
  });

  video.addEventListener("error", () => {
    console.error("Error cargando el vídeo:", video.currentSrc);
    avanzarFlujo();
  });

  timeoutActual = setTimeout(() => {
    mostrarVideoActual();
  }, PRIMER_INICIO);
</script>

</body>
</html>
